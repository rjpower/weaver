name: CI

# Gates merges into main. Every job that compiles `loom` runs build.rs, which
# builds the Vue SPA (npm + rspack) — so each sets up Node with an npm cache, and
# a broken frontend dependency tree (e.g. an rspack peer-dependency conflict from
# a Dependabot bump) fails CI on any of them instead of on a contributor's
# machine. `rerun-if-changed` keeps the SPA build a no-op when nothing changed.

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes to the same branch cancel in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/loom/frontend/package-lock.json
      # build.rs runs the frontend toolchain (npm + rspack); this is the check
      # that catches frontend dependency breakage.
      - run: cargo build --workspace --locked

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # clippy compiles loom (and runs build.rs → the SPA build), so Node is
      # needed here too.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/loom/frontend/package-lock.json
      # Same fmt + clippy gate developers run locally via the pre-commit hook
      # (.githooks/pre-commit), so "passes locally" means "passes CI".
      - run: ./scripts/pre-commit.sh

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/loom/frontend/package-lock.json
      # Integration tests shell out to real `git` and `tmux` (see AGENTS.md).
      - run: sudo apt-get update && sudo apt-get install -y tmux
      - run: cargo test --workspace --locked

  python-binding:
    name: python-binding
    runs-on: ubuntu-latest
    # weaver-py is a PyO3 extension over weaver-api, kept out of the Cargo
    # workspace (it links libpython). This job is fully self-contained: it builds
    # the abi3 wheel with maturin and runs the binding's pytest. It needs no Node
    # (weaver-py doesn't touch loom/the frontend) and shares no steps with the
    # build/lint/test jobs, so it can't affect them. The live round-trip test is
    # opt-in (WEAVER_PY_LIVE) and stays out of CI; the server-free gating suite —
    # the capability enforcement contract — is the coverage here.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/weaver-py
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install maturin pytest
      - run: maturin build --release --manifest-path crates/weaver-py/Cargo.toml --out dist
      - run: pip install --find-links dist weaver-py
      - run: pytest crates/weaver-py/tests -v
