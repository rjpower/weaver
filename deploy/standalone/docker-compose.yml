# Self-contained, internet-facing loom deploy (Model 1, single shared container).
#
# This stack OWNS its front-door: a bundled Caddy terminates TLS for $LOOM_DOMAIN
# and is the only service that publishes ports. loom itself is never bound on the
# host — the only way in is through Caddy.
#
# Full guide, env reference, and first-run steps: ../README.md
name: loom

services:
  # One-shot: seed the security-relevant auth settings into the shared sqlite DB
  # BEFORE loom starts, so an internet-exposed deploy never comes up trusting
  # loopback or minting a non-Secure session cookie. `loom config set` writes
  # the settings table directly — no running server needed — then exits; loom
  # waits on its success. Idempotent: it re-runs on every `up` and just rewrites
  # the same three values. (See ../README.md "Security posture".)
  loom-init:
    image: ${LOOM_IMAGE:-loom:latest}
    build:
      context: ../..
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
        # Debug by default (fast to build); set CARGO_PROFILE=release for a
        # production deploy. The image build caches the cargo target across
        # rebuilds (BuildKit cache mounts — see the Dockerfile).
        CARGO_PROFILE: ${CARGO_PROFILE:-debug}
    env_file: .env
    restart: "no"
    volumes:
      - loom_home:/home/app
    # $$LOOM_DOMAIN is escaped from compose so the *container* shell expands it
    # from the env_file — keeping the domain in one place (.env).
    command:
      - sh
      - -ceu
      - |
        loom config set auth.trust_loopback false
        loom config set auth.cookie_secure true
        loom config set auth.base_url "https://$$LOOM_DOMAIN"

  loom:
    image: ${LOOM_IMAGE:-loom:latest}
    # No build: of its own — loom runs the very image loom-init builds (identical
    # Dockerfile + args, same tag). Declaring the build once keeps `up --build`
    # from building *and* exporting the (large) image twice; loom-init runs first
    # (below), so the image exists by the time this service starts.
    restart: unless-stopped
    env_file: .env
    # RUST_BACKTRACE feeds anyhow's backtrace capture, so an internal (500) error's
    # server log carries the stack where the error arose, not just its message.
    # Cheap here — loom is low-traffic and errors are rare. A backtrace at a
    # *warning* would only show tokio executor frames (the async stack isn't the
    # request path), so warnings rely on the per-request span (method/path) instead.
    environment:
      RUST_BACKTRACE: "1"
    depends_on:
      loom-init:
        condition: service_completed_successfully
    expose:
      - "7878" # internal to the compose network only — never published
    ports:
      # Loopback-only scrape/debug path for the host's Ops Agent. Caddy remains
      # the sole public listener and explicitly blocks `/metrics`.
      - "127.0.0.1:7878:7878"
    # Docker-out-of-Docker: a session's `docker build`/`docker compose` talks to
    # the HOST's Docker daemon over its bind-mounted socket (volumes, below), so
    # builds run on the host — reusing its layer cache and writing images/layers
    # to the host data-root (the persistent data disk on the GCP deploy), not into
    # the container. The non-root app user reaches the root-owned socket by joining
    # the host `docker` group via its numeric gid: startup-script.sh derives it on
    # the GCP VM and run.py on a standalone host (both append DOCKER_GID to .env);
    # the 999 fallback is the usual Debian docker gid for a hand-run `compose up`.
    # SECURITY: this is the SAME daemon that runs this stack, so a session's docker
    # commands can see and mutate loom's own containers/volumes (the DB included) —
    # and socket access is root-equivalent on the host. Acceptable only because
    # this is a single-tenant box running the owner's own agents (see ../README.md
    # "Security posture").
    group_add:
      - "${DOCKER_GID:-999}"
    # Per-session memory limits (`session.memory_max_gb`): at boot the
    # entrypoint runs loom-cgroup-init (see the Dockerfile), which remounts the
    # container's own cgroup-v2 tree read-write and delegates an agents/
    # subtree to the app user; each session then confines itself there and a
    # runaway agent OOMs alone instead of taking the VM down. The remount is
    # what needs SYS_ADMIN and an unconfined AppArmor profile. Bubblewrap also
    # needs the unconfined seccomp profile below to create its sandbox namespaces.
    # These are wider than default, but this container already holds the
    # root-equivalent docker.sock (above), so they add nothing on this
    # single-tenant box. Without the first two the init script fails and sessions
    # simply run unlimited.
    cap_add:
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
      # Docker's default seccomp profile denies the namespace operations bwrap
      # needs. Scope this exception to loom; the container is already the
      # single-tenant trust boundary because it has the host Docker socket.
      - seccomp=unconfined
    # The delegation dance assumes the container sees only its own cgroup
    # subtree; private is the cgroup-v2 default, pinned here because the limits
    # depend on it.
    cgroup: private
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Persisted HOME for the container user. Everything stateful lives here and
      # is owned by the `app` user the image runs as:
      #   * the weaver sqlite db + the 0600 machine-local loom token (~/.weaver),
      #   * ~/.claude.json (so a one-time `claude` login survives a recreate),
      #   * the managed repo store the @loom webhook clones into
      #     (WEAVER_REPOS_DIR, default ~/.weaver/repos) — inspect with
      #     `docker compose exec loom ls .weaver/repos`.
      # Kept inside this volume on purpose: a fresh *separate* named volume would
      # mount root-owned (the image has no such dir to seed ownership from), and
      # the non-root app user could not clone into it.
      - loom_home:/home/app
      # uv's managed interpreters + wheel cache, for Python repos the agents work
      # in (UV_PYTHON_INSTALL_DIR / UV_CACHE_DIR point here; the Dockerfile
      # pre-creates /opt/uv owned by app so this volume seeds writable).
      - uv:/opt/uv

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      # Consumed by the Caddyfile. Fails fast if LOOM_DOMAIN is unset.
      LOOM_DOMAIN: ${LOOM_DOMAIN:?set LOOM_DOMAIN in deploy/standalone/.env}
      LOOM_TLS_EMAIL: ${LOOM_TLS_EMAIL:-}
    ports:
      - "80:80"     # ACME HTTP-01 challenge + the HTTP->HTTPS redirect
      - "443:443"   # HTTPS
      - "443:443/udp" # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data     # issued certs + ACME account — survive a recreate
      - caddy_config:/config
    depends_on:
      - loom

volumes:
  loom_home:
  uv:
  caddy_data:
  caddy_config:
