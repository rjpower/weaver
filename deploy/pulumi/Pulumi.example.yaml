# Copy to Pulumi.<stack>.yaml, then set loomDotenv with `pulumi config set
# --secret`; never put its plaintext value in this file.
config:
  gcp:project: my-project
  loom-gcp:region: us-central1
  loom-gcp:zone: us-central1-a
  loom-gcp:domain: loom.example.com
  loom-gcp:operatorCidr: 203.0.113.7/32
  # Existing VPC name. The stack adds Loom's tagged web and SSH rules but does
  # not modify or second-guess unrelated rules managed by the operator.
  loom-gcp:network: default
  # Set this to bootstrap.py's --service-account-name before importing a
  # non-default legacy deployment.
  loom-gcp:vmServiceAccountName: loom-vm
  # Name of an existing, already-delegated Cloud DNS managed zone. Omit this
  # field when DNS is hosted elsewhere and create the exported A record there.
  loom-gcp:dnsManagedZone: example-com
  loom-gcp:githubRepository: marin-community/loom
  loom-gcp:githubRef: refs/heads/main
  # Build locally on the VM for the first deployment. After the image workflow
  # has published an image, change to pull and add imageTag with its commit SHA.
  loom-gcp:imageMode: build
  # Runtime policy is reconciled through Loom's REST API on every startup
  # generation. Environment values are Secret Manager references, never raw
  # values in Pulumi state or VM metadata.
  loom-gcp:profiles:
    ops:
      description: Marin operations automation
      class: automation
      agent: codex
      protocol: acp
      mode: plan
      strict: true
      envClear: true
      ambientAllowlist: []
      maxConcurrent: 1
      turnBudget: 20
      idleArchiveSeconds: 1800
      env:
        KUBECONFIG:
          secretRef: projects/my-project/secrets/ops-kubeconfig/versions/latest
    github_comment:
      description: Restricted GitHub automation with a caller-supplied prompt
      class: automation
      agent: claude
      protocol: acp
      mode: default
      strict: true
      envClear: true
      ambientAllowlist: []
      prelude: none
      restricted: true
      allowedTools:
        - Read(./**)
        - mcp/github/comment
      maxConcurrent: 4
      turnBudget: 4
      idleArchiveSeconds: 900
      env:
        GH_TOKEN:
          secretRef: projects/my-project/secrets/loom-github-ci-token/versions/latest
  # Pulumi creates these service accounts and exports the non-secret client
  # configuration a Cloud Run service or Grafana gateway consumes. Import an
  # existing account at the generated resource URN before the first update.
  loom-gcp:workloads:
    - name: marin-ops
      serviceAccountId: loom-marin-ops
      serviceTag: marin-ops
      profile: ops
    - name: grafana
      serviceAccountId: loom-grafana
      serviceTag: grafana
      profile: ops
  loom-gcp:githubFederations:
    - name: weaver-issues
      repositoryId: "123456789"
      workflowRef: marin-community/loom/.github/workflows/loom-issue.yml@refs/heads/main
      event: issues
      ref: refs/heads/main
      serviceTag: weaver-actions
      profile: ops
    - name: marin-prose-cleanup
      repositoryId: "987654321"
      workflowRef: marin-community/marin/.github/workflows/prose-cleanup.yml@refs/heads/main
      event: issues
      serviceTag: marin-prose-cleanup
      profile: github_comment
  # Optional Cloud Monitoring email channels for the managed readiness alert.
  loom-gcp:alertEmails:
    - operator@example.com
